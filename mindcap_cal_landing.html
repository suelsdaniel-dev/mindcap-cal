<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; }

  body {
    font-family: "Inter", sans-serif;
    background: #0d0b1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #0d0b1a;
    width: 100%;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 72px 48px;
  }

  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  .glow {
    position: absolute;
    top: -150px;
    right: -150px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(109,40,217,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 44px;
    position: relative;
    z-index: 1;
  }

  .logo-img {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
  }

  .logo-name {
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .divider-line {
    width: 56px;
    height: 2px;
    background: linear-gradient(90deg, #7c3aed, transparent);
    margin-bottom: 32px;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-size: clamp(52px, 9vw, 100px);
    font-weight: 900;
    color: #ffffff;
    line-height: 1.02;
    letter-spacing: -0.045em;
    margin-bottom: 48px;
    position: relative;
    z-index: 1;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
    color: #fff;
    font-size: clamp(15px, 2vw, 18px);
    font-weight: 700;
    padding: 20px 48px;
    border-radius: 10px;
    text-decoration: none;
    letter-spacing: 0.01em;
    font-family: inherit;
    box-shadow: 0 0 32px rgba(109,40,217,0.45);
    position: relative;
    z-index: 1;
    transition: all 0.18s ease;
    border: none;
    cursor: pointer;
  }

  .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 48px rgba(109,40,217,0.65);
  }

  @media (max-width: 600px) {
    .card { padding: 52px 28px; }
    .logo-img { width: 48px; height: 48px; }
    .logo-name { font-size: 20px; }
    .cta-btn { width: 100%; }
  }
</style>
</head>
